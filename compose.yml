services:
  backend:
    build: .
    image: santasoft/smartlockr-back:latest
    ports:
      - "8080:8080"
      - "9090:9090"
    env_file: vars_docker.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: santasoft
    volumes:
      - db-data:/var/lib/postgresql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost" ]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 5s
  redis:
    image: redis:8.4-alpine
    container_name: smartlockr-redis
    labels:
      - "org.springframework.boot.ignore=true"
    env_file: vars_docker.env
    command: >-
      sh -c "redis-server
      --requirepass $$SPRING_DATA_REDIS_PASSWORD
      --notify-keyspace-events Ex
      --appendonly yes"
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "sh", "-c", "redis-cli -a $$SPRING_DATA_REDIS_PASSWORD ping" ]
      interval: 3s

volumes:
  db-data:
  redis-data: