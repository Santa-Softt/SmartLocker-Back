services:
  backend:
    build: .
    pull_policy: build
    container_name: smartlockr-backend
    image: santasoft/smartlockr-back:latest
    ports:
      - "8080:8080"
      - "9090:9090"
    env_file: vars_docker.env
    environment:
      MANAGEMENT_SERVER_ADDRESS: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9090/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  postgres:
    image: postgres:18
    container_name: postgres
    env_file:
      - postgres.env
    volumes:
      - db-data:/var/lib/postgresql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  redis:
    image: redis:8.4-alpine
    container_name: smartlockr-redis
    labels:
      - "org.springframework.boot.ignore=true"
    env_file: redis.env
    command: >-
      sh -c "redis-server
      --requirepass $$REDIS_PASSWORD
      --notify-keyspace-events Ex
      --appendonly yes"
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "sh", "-c", "redis-cli -a $$REDIS_PASSWORD ping" ]
      interval: 10s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: smartlockr-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-smartlockr}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-smartlockr}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.8.1
    container_name: smartlockr-prometheus
    depends_on:
      backend:
        condition: service_healthy
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9091:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.2.0
    container_name: smartlockr-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    restart: unless-stopped

volumes:
  db-data:
  redis-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:
