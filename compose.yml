services:
  backend:
    build: .
    pull_policy: build
    container_name: smartlockr-backend
    image: santasoft/smartlockr-back:latest
    ports:
      - "8080:8080"
      - "9090:9090"
    env_file: vars_docker.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9090/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  postgres:
    image: postgres:18
    container_name: postgres
    env_file:
      - postgres.env
    volumes:
      - db-data:/var/lib/postgresql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  redis:
    image: redis:8.4-alpine
    container_name: smartlockr-redis
    labels:
      - "org.springframework.boot.ignore=true"
    env_file: redis.env
    command: >-
      sh -c "redis-server
      --requirepass $$REDIS_PASSWORD
      --notify-keyspace-events Ex
      --appendonly yes"
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "sh", "-c", "redis-cli -a $$REDIS_PASSWORD ping" ]
      interval: 10s

volumes:
  db-data:
  redis-data: