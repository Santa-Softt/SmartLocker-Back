name: Release & Docker Build

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - develop

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine new version from PR labels
        id: determine_version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest_tag=$(git tag -l 'v*' | sort -V | tail -n1)
          if [[ -z "$latest_tag" ]]; then
            major=0; minor=1; patch=0
          else
            IFS='.' read -r major minor patch <<< "${latest_tag#v}"
          fi

          labels=$(gh pr view ${{ github.event.pull_request.number }} --json labels --template '{{range .labels}}{{.name}} {{end}}')

          if [[ "$labels" =~ "version:major" ]]; then
            major=$((major + 1)); minor=0; patch=0
          elif [[ "$labels" =~ "version:minor" ]]; then
            minor=$((minor + 1)); patch=0
          elif [[ "$labels" =~ "version:patch" ]]; then
            patch=$((patch + 1))
          else
            echo "❌ PR sin etiqueta válida (version:major, version:minor, version:patch)."
            exit 1
          fi

          new_tag="v${major}.${minor}.${patch}"
          echo "NEW_VERSION=$new_tag" >> $GITHUB_ENV

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.APP_NAME }}:${{ env.NEW_VERSION }}

      - name: Create and push Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$NEW_VERSION" >/dev/null 2>&1; then
            echo "Tag $NEW_VERSION ya existe."
            exit 0
          fi

          git tag -a "$NEW_VERSION" -m "🚀 Release $NEW_VERSION"
          git push origin "$NEW_VERSION"