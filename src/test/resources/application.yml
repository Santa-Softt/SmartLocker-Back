spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: sa
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
# Dummy Configuration
security:
  secret-b64: "EWS99dPxGwUiFSBXEV8ZHF7OUpHN0_qXB46ryvpQf0u0ETGm_B__aaxex54t5K35pd3OlqCjjDzNgDbOuqxIVw=="
  audience: "test-audience"
  issuer: "test-issuer"
  access-ttl-duration: 1d
  refresh-ttl-duration: 7d
  refresh-token-byte-size: 64
  oauth-redirect-uri: "http://localhost/callback"
  admin-email: "sysadmin@gmail.com"
  cookies:
    secure: false
    same-site: "Lax"
smartlockr:
  allowed-origins: "*"
mercadopago:
  access-token: "APP-USER-1234...1234.."
  webhook-secret: "some_secret_webhook"
  webhook-url: "webhook"
  back-url-success: "success"
  back-url-failure: "failure"
graphiql:
  public-access: false
management:
  health:
    # Desactivar el chequeo de salud de redis que impide los tests de integración
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: 'info'
