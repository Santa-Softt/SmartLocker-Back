spring:
  application:
    name: SmartLockr
  data:
    web:
      pageable:
        max-page-size: 100
        default-page-size: 20
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      connect-timeout: 2000
      repositories:
        enabled: false
      lettuce:
        pool:
          max-active: 12
          max-idle: 8
          min-idle: 2
  graphql:
    schema:
      file-extensions: .graphql, .graphqls, .gql, .gqls
    websocket:
      path: /graphql
      keep-alive: 30s
  threads:
    virtual:
      enabled: true
  jpa:
    open-in-view: false
    properties:
      hibernate:
        batch_fetch_style: PADDED
        default_batch_fetch_size: 12
        query:
          in_clause_parameter_padding: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Google
        provider:
          google:
            issuer-uri: https://accounts.google.com
  datasource:
    hikari:
      connection-timeout: 5000
      maximum-pool-size: 20
management:
  server:
    port: 9090
server:
  error:
    include-stacktrace: never
smartlockr:
  allowed-origins: ${ALLOWED_ORIGINS}
  business:
    max-hold-duration-seconds: 240
    min-rental-duration: 5
    max-rental-duration: 1440
    rates:
      XS: 1200
      S: 2300
      M: 3800
      L: 4900
      XL: 6150
    quantities:
      XS: 24
      S: 20
      M: 16
      L: 10
      XL: 8
    penalty-percentage: 50
    streak-discount-percentage: 10
    streak-threshold: 7
graphiql:
  public-access: ${DEV_GRAPHIQL}
