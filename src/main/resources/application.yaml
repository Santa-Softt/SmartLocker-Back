spring:
  application:
    name: SmartLockr
  data:
    web:
      pageable:
        max-page-size: 100
        default-page-size: 20
  graphql:
    schema:
      file-extensions: .graphql, .graphqls, .gql, .gqls
    websocket:
      path: /graphql
      keep-alive: 30s
  threads:
    virtual:
      enabled: true
  jpa:
    open-in-view: false
    properties:
      hibernate:
        batch_fetch_style: PADDED
        default_batch_fetch_size: 12
        query:
          in_clause_parameter_padding: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Google
        provider:
          google:
            issuer-uri: https://accounts.google.com
  datasource:
    hikari:
      connection-timeout: 5000
      maximum-pool-size: 20
management:
  server:
    port: 9090
server:
  error:
    include-stacktrace: never
smartlockr:
  allowed-origins: ${ALLOWED_ORIGINS}
