spring:
  application:
    name: SmartLockr
  data:
    web:
      pageable:
        max-page-size: 100
        default-page-size: 20
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      connect-timeout: 5s
      timeout: 5s
      repositories:
        enabled: false
      lettuce:
        pool:
          max-active: 12
          max-idle: 8
          min-idle: 2
          max-wait: 5s
  graphql:
    schema:
      file-extensions: .graphql, .graphqls, .gql, .gqls
    websocket:
      path: /graphql
      keep-alive: 30s
  threads:
    virtual:
      enabled: true
  jpa:
    open-in-view: false
    properties:
      hibernate:
        batch_fetch_style: PADDED
        default_batch_fetch_size: 12
        query:
          in_clause_parameter_padding: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Google
        provider:
          google:
            issuer-uri: https://accounts.google.com
  datasource:
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 20
management:
  server:
    port: 9090
    address: 127.0.0.1
  endpoints:
    web:
      exposure:
        include: health
server:
  error:
    include-stacktrace: never
smartlockr:
  allowed-origins: ${ALLOWED_ORIGINS}
  business:
    max-hold-duration-seconds: 240
    min-rental-duration-minutes: 15
    max-rental-duration-minutes: 10800
    rates:
      XS: 1600
      S: 2300
      M: 3800
      L: 4900
      XL: 6150
    quantities:
      XS: 128
      S: 80
      M: 72
      L: 64
      XL: 0
    penalty-percentage: 50
    streak-discount-percentage: 10
    streak-threshold: 7
graphiql:
  public-access: ${DEV_GRAPHIQL}
redis:
  idempotency-lock-ttl-hours: ${REDIS_IDEMPOTENCY_LOCK_TTL_HOURS:24}
  cache:
    locker-summary: 5s
    locker-available-by-size: 10s
    default-ttl: 10m
    user-ttl: 15m
async:
  webhook:
    core-pool-size: ${ASYNC_WEBHOOK_CORE_POOL_SIZE:4}
    max-pool-size: ${ASYNC_WEBHOOK_MAX_POOL_SIZE:8}
    queue-capacity: ${ASYNC_WEBHOOK_QUEUE_CAPACITY:100}
    await-termination-seconds: ${ASYNC_WEBHOOK_AWAIT_TERMINATION_SECONDS:60}
