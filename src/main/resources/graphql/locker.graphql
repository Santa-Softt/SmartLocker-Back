type Query {
    getAvailableLockersBySize(size: LockerSize!): [Locker!]!
    getLockerSizeSummaries: [LockerSizeSummary!]!
}

type Subscription {
    onLockerStateChange: LockerUpdateResponse!
}

type LockerUpdateResponse {
    id: ID!
    state: LockerState!
}

type Locker {
    id: ID!
    label: String!
    size: LockerSize!
    state: LockerState!
}

enum LockerSize {
    XS
    S
    M
    L
    XL
}

enum LockerState {
    AVAILABLE
    HOLD
    OCCUPIED
    MAINTENANCE
}

type LockerSizeSummary{
    size: LockerSize!
    hourlyRate: Float!
    availableCount: Int!
}